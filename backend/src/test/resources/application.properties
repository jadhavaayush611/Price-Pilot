spring.profiles.active=test
spring.application.name=pricepilot
spring.jpa.open-in-view=false

# PricePilot AI Gateway Configuration
pricepilot.ai.enabled=true
pricepilot.ai.timeout=5000
pricepilot.ai.retry-count=3
pricepilot.ai.url=${pricepilot.ai.url:http://localhost:8000}
pricepilot.ai.api-key=${pricepilot.ai.api-key:test-api-key}

# CORS Configuration
pricepilot.cors.allowed-origins=${PRICEPILOT_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
