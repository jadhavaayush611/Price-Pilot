server.port=8080

# PostgreSQL Connection Configuration
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:5432/pricepilot
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQL Logging Options
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Redis Caching Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.cache.type=simple

# PricePilot AI Gateway Configuration
pricepilot.ai.url=${PRICEPILOT_AI_URL:http://localhost:8000}
pricepilot.ai.api-key=${PRICEPILOT_AI_API_KEY:pricepilot-secret-api-key}

# JWT Secret
pricepilot.jwt.secret=${PRICEPILOT_JWT_SECRET:dev-secret-key-must-be-at-least-256-bits-long-otherwise-jjwt-throws-exception-1234567890}

# Micrometer and Prometheus Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.web.server.request.autotime.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Hibernate statistics for query latency metrics
spring.jpa.properties.hibernate.generate_statistics=true
