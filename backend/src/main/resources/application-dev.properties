server.port=8080

# PostgreSQL Connection Configuration
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:5432/pricepilot
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=PricePilotHikariPool

# JDBC Prepared Statement Caching Optimization
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQL Logging Options
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Redis Caching Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.cache.type=simple

# PricePilot AI Gateway Configuration
pricepilot.ai.url=${PRICEPILOT_AI_URL:http://localhost:8000}
pricepilot.ai.api-key=${PRICEPILOT_AI_API_KEY:pricepilot-secret-api-key}

# JWT Secret
pricepilot.jwt.secret=${PRICEPILOT_JWT_SECRET:ZGV2LXNlY3JldC1rZXktbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cy1sb25nLW90aGVyd2lzZS1qand0LXRocm93cy1leGNlcHRpb24tMTIzNDU2Nzg5MA==}

# Micrometer and Prometheus Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.web.server.request.autotime.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Hibernate statistics for query latency metrics
spring.jpa.properties.hibernate.generate_statistics=true

# Configurable Rate Limiting
pricepilot.rate-limit.enabled=true
pricepilot.rate-limit.auth.limit=30
pricepilot.rate-limit.ai.limit=60
pricepilot.rate-limit.recommendation.limit=90
