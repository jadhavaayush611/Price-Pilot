spring.profiles.active=dev
spring.application.name=pricepilot
spring.jpa.open-in-view=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# PricePilot Application Info Metadata for Actuator
info.app.name=PricePilot Backend
info.app.description=PricePilot E-Commerce Intelligence Platform Backend
info.app.version=1.0.1

# Common Micrometer & Redis Metrics Configuration
management.metrics.tags.application=pricepilot-backend
spring.cache.redis.enable-statistics=true

# PricePilot AI Gateway Configuration
pricepilot.ai.enabled=true
pricepilot.ai.timeout=5000
pricepilot.ai.retry-count=3
pricepilot.ai.url=${pricepilot.ai.url}
pricepilot.ai.api-key=${pricepilot.ai.api-key}

# CORS Configuration
pricepilot.cors.allowed-origins=${PRICEPILOT_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Shopping Intelligence Scoring Weights (Externalized)
pricepilot.intelligence.scoring.weights.price-competitiveness=0.30
pricepilot.intelligence.scoring.weights.discount-percentage=0.20
pricepilot.intelligence.scoring.weights.product-rating=0.20
pricepilot.intelligence.scoring.weights.popularity=0.10
pricepilot.intelligence.scoring.weights.seller-reputation=0.10
pricepilot.intelligence.scoring.weights.availability=0.10

