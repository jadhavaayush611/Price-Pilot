spring.profiles.active=dev
spring.application.name=pricepilot
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# PricePilot AI Gateway Configuration
pricepilot.ai.enabled=true
pricepilot.ai.url=http://localhost:8000
pricepilot.ai.timeout=5000
pricepilot.ai.retry-count=3
pricepilot.ai.api-key=pricepilot-secret-api-key

