server.port=8080

# PostgreSQL Connection Configuration (Production environment overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration for Production
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Production Logging Config & Level
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR
logging.level.root=INFO
logging.level.com.pricepilot=INFO

# Structured JSON Logging for Production Observability
logging.structured.format.console=ecs

# Redis Caching Configuration (Production)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.cache.type=redis

# PricePilot AI Gateway Configuration
pricepilot.ai.url=${PRICEPILOT_AI_URL}
pricepilot.ai.api-key=${PRICEPILOT_AI_API_KEY}

# JWT Secret
pricepilot.jwt.secret=${PRICEPILOT_JWT_SECRET}

# Micrometer and Prometheus Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.web.server.request.autotime.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Hibernate statistics for query latency metrics
spring.jpa.properties.hibernate.generate_statistics=true

# CORS Configuration
pricepilot.cors.allowed-origins=${PRICEPILOT_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Configurable Rate Limiting
pricepilot.rate-limit.enabled=${PRICEPILOT_RATE_LIMIT_ENABLED:true}
pricepilot.rate-limit.auth.limit=${PRICEPILOT_RATE_LIMIT_AUTH:10}
pricepilot.rate-limit.ai.limit=${PRICEPILOT_RATE_LIMIT_AI:20}
pricepilot.rate-limit.recommendation.limit=${PRICEPILOT_RATE_LIMIT_RECOMMENDATION:30}
