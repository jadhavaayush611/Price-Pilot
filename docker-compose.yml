services:
  pricepilot-db:
    image: postgres:15-alpine
    container_name: pricepilot-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 15s
    networks:
      - pricepilot-network

  pricepilot-redis:
    image: redis:7-alpine
    container_name: pricepilot-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory ${REDIS_MAX_MEMORY} --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 15s
    networks:
      - pricepilot-network

  pricepilot-ai:
    build:
      context: .
      dockerfile: pricepilot-ai/Dockerfile
    container_name: pricepilot-ai
    environment:
      PRICEPILOT_AI_API_KEY: ${PRICEPILOT_AI_API_KEY}
      MODEL_DIR: /app/models/recommendation
      ENV: production
      LOG_LEVEL: INFO
      BACKEND_URL: http://pricepilot-backend:8080/api/v1
    volumes:
      - ./models:/app/models:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - pricepilot-network

  pricepilot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricepilot-backend
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://pricepilot-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: pricepilot-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      PRICEPILOT_AI_URL: ${PRICEPILOT_AI_URL}
      PRICEPILOT_AI_API_KEY: ${PRICEPILOT_AI_API_KEY}
      PRICEPILOT_JWT_SECRET: ${PRICEPILOT_JWT_SECRET}
      PRICEPILOT_CORS_ALLOWED_ORIGINS: ${PRICEPILOT_CORS_ALLOWED_ORIGINS}
    depends_on:
      pricepilot-db:
        condition: service_healthy
      pricepilot-redis:
        condition: service_healthy
      pricepilot-ai:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 45s
    networks:
      - pricepilot-network

  pricepilot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: pricepilot-frontend
    ports:
      - "${FRONTEND_PORT}:8080"
    depends_on:
      pricepilot-backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    stop_grace_period: 15s
    networks:
      - pricepilot-network

volumes:
  postgres_data:
  redis_data:

networks:
  pricepilot-network:
    driver: bridge
