name: Security Hardening & Dependency Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Maven Dependency Scan (Backend)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check (Backend)
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw org.owasp:dependency-check-maven:10.0.3:check -DfailBuildOnCVSS=7 -Dformat=HTML
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html

      # 2. Frontend Dependency Scan
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high

      # 3. Python Dependency Scan (AI Service & SDK)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on AI Service
        run: |
          cd pricepilot-ai
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi

      - name: Run pip-audit on Python SDK
        run: |
          cd pricepilot-python-sdk
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi
