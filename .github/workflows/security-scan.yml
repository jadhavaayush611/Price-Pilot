name: Security Hardening & Dependency Scan

on:
  push:
    branches: [ main, master, maintenance ]
  pull_request:
    branches: [ main, master, maintenance ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Maven Dependency Scan (Backend)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Print Diagnostic Commit and Branch Info
        run: |
          echo "Current Commit SHA: $(git rev-parse HEAD)"
          echo "Current Branch: $(git rev-parse --abbrev-ref HEAD)"

      - name: Generate and Output Dependency Tree
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw dependency:tree -Dverbose > dependency-tree.txt
          echo "=== Netty Dependencies ==="
          grep -i "netty" dependency-tree.txt || true
          echo "=== PostgreSQL Dependencies ==="
          grep -i "postgresql" dependency-tree.txt || true

      - name: Upload Dependency Tree Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-tree
          path: backend/dependency-tree.txt

      - name: Run OWASP Dependency Check (Backend)
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw -U clean verify \
            org.owasp:dependency-check-maven:12.2.2:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DsuppressionFile=dependency-check-suppression.xml \
            -DnvdApiKey=${NVD_API_KEY}
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html

      # 2. Frontend Dependency Scan
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high

      # 3. Python Dependency Scan (AI Service & SDK)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on AI Service
        run: |
          cd pricepilot-ai
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi

      - name: Run pip-audit on Python SDK
        run: |
          cd pricepilot-python-sdk
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi
