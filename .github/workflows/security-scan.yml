name: Security Hardening & Dependency Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Maven Dependency Scan (Backend)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        uses: dependency-check/DependencyCheck_action@main
        with:
          project: 'PricePilot-Backend'
          path: './backend'
          format: 'HTML'
          args: '--failOnCVSS 7' # CVSS >= 7 is High/Critical

      # 2. Frontend Dependency Scan
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=high

      # 3. Python Dependency Scan (AI Service & SDK)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on AI Service
        run: |
          cd pricepilot-ai
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi

      - name: Run pip-audit on Python SDK
        run: |
          cd pricepilot-python-sdk
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip-audit
          fi
